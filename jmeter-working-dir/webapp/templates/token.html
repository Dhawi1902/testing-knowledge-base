<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Token Required</title>
    <meta name="base-path" content="{{ bp }}">
    <link rel="stylesheet" href="{{ bp }}/static/css/style.css?v=7">
    <style>
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; background:var(--bg-color); }
        .token-card { max-width:400px; width:100%; padding:32px; }
        .token-card h2 { margin:0 0 8px; font-size:1.25rem; }
        .token-card p { margin:0 0 20px; color:var(--text-light); font-size:0.875rem; }
        .token-error { color:var(--color-danger); font-size:0.875rem; margin-top:8px; display:none; }
    </style>
</head>
<body>
    <div class="card token-card">
        <h2>JMeter Dashboard</h2>
        <p>Enter the access token to continue.</p>
        <form id="tokenForm" onsubmit="return submitToken(event)">
            <div class="form-group">
                <label class="form-label">Access Token</label>
                <input class="form-input" id="tokenInput" type="password" placeholder="Enter token" autofocus required>
                <div class="token-error" id="tokenError">Invalid token. Please try again.</div>
            </div>
            <button class="btn btn-primary" type="submit" id="submitBtn" style="width:100%;margin-top:12px;">Continue</button>
        </form>
    </div>

    <script>
    async function submitToken(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const errEl = document.getElementById('tokenError');
        const token = document.getElementById('tokenInput').value;

        btn.disabled = true;
        btn.textContent = 'Verifying...';
        errEl.style.display = 'none';

        try {
            const bp = document.querySelector('meta[name="base-path"]')?.content || '';
            const res = await fetch(`${bp}/api/auth/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
            const data = await res.json();
            if (data.ok) {
                window.location.href = data.redirect || `${bp}/`;
            } else {
                errEl.style.display = 'block';
                document.getElementById('tokenInput').select();
            }
        } catch (err) {
            errEl.textContent = 'Connection error. Please try again.';
            errEl.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Continue';
    }
    </script>
</body>
</html>
