{% extends "base.html" %}

{% block title %}Results{% endblock %}
{% block page_title %}Results{% endblock %}

{% block content %}
<div class="card mb-16">
    <div class="card-header">
        <span class="card-title">Test Results</span>
        <div class="flex gap-8">
            <button class="btn btn-outline btn-sm" id="downloadBundleBtn" onclick="downloadBundle()" disabled>Download Selected</button>
            <button class="btn btn-outline btn-sm" id="compareBtn" onclick="compareSelected()" disabled>Compare Selected</button>
            <button class="btn btn-outline btn-sm" onclick="loadResults()">Refresh</button>
        </div>
    </div>
    <div class="flex gap-8 mb-16" style="align-items:center;">
        <input class="form-input" id="resultSearch" placeholder="Search results..." oninput="filterResults()" style="max-width:300px;">
        <span class="text-sm text-light" id="resultCount"></span>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width:30px;"><label class="check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"><span class="check-box"></span></label></th>
                    <th>Folder</th>
                    <th>Date</th>
                    <th>Size</th>
                    <th>Report</th>
                    <th>JTL</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="resultsList">
                <tr><td colspan="7" class="text-light">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Compare Panel -->
<div class="card hidden" id="comparePanel">
    <div class="card-header">
        <span class="card-title">Comparison</span>
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('comparePanel').classList.add('hidden')">Close</button>
    </div>
    <div id="compareContent"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
const ACCESS_LEVEL = '{{ access_level | default("viewer") }}';
const isAdmin = ACCESS_LEVEL !== 'viewer';
const isLocalhost = {{ 'true' if is_localhost else 'false' }};
let allFolders = [];

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function loadResults() {
    const data = await api('/api/results/list');
    allFolders = data.folders || [];
    renderResults();
}

function renderResults() {
    const tbody = document.getElementById('resultsList');
    const query = (document.getElementById('resultSearch').value || '').toLowerCase();
    const filtered = query ? allFolders.filter(f => f.name.toLowerCase().includes(query)) : allFolders;
    document.getElementById('resultCount').textContent = filtered.length === allFolders.length
        ? `${allFolders.length} results`
        : `${filtered.length} of ${allFolders.length} results`;
    if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-light">${allFolders.length ? 'No matching results.' : 'No results found.'}</td></tr>`;
        return;
    }
    tbody.innerHTML = filtered.map(f => {
        const eName = escHtml(f.name);
        let actions = '';
        if (f.has_report) actions += `<button class="btn btn-outline btn-sm" onclick="openReport('${eName}')">Report &#8599;</button>`;
        if (f.has_report) actions += `<button class="btn btn-outline btn-sm" onclick="downloadReport('${eName}')" title="Download report as zip">Download</button>`;
        if (f.has_jtl && isAdmin) actions += `<button class="btn btn-outline btn-sm" id="regen-${eName}" onclick="regenerateReport('${eName}')">Regenerate</button>`;
        if (isLocalhost) actions += `<button class="btn btn-outline btn-sm" onclick="openFolder('${eName}')">Open</button>`;
        if (isAdmin) actions += `<button class="btn btn-sm btn-outline" onclick="deleteResult('${eName}')" style="color:var(--color-danger);border-color:var(--color-danger);">Delete</button>`;
        return `<tr>
            <td><label class="check"><input type="checkbox" class="result-check" value="${eName}" onchange="updateSelectionBtns()"><span class="check-box"></span></label></td>
            <td class="text-mono">${eName}</td>
            <td class="text-sm">${new Date(f.date).toLocaleString()}</td>
            <td>${formatSize(f.size)}</td>
            <td>${f.has_report ? '<span class="badge badge-success">Yes</span>' : '<span class="badge badge-danger">No</span>'}</td>
            <td>${f.has_jtl ? '<span class="badge badge-success">Yes</span>' : '<span class="badge badge-danger">No</span>'}</td>
            <td class="table-actions"><div class="flex gap-8" style="flex-wrap:wrap;">${actions}</div></td>
        </tr>`;
    }).join('');
}

function filterResults() { renderResults(); }

function toggleSelectAll() {
    const checked = document.getElementById('selectAll').checked;
    document.querySelectorAll('.result-check').forEach(cb => cb.checked = checked);
    updateSelectionBtns();
}
function updateSelectionBtns() {
    const count = document.querySelectorAll('.result-check:checked').length;
    document.getElementById('compareBtn').disabled = count !== 2;
    document.getElementById('downloadBundleBtn').disabled = count === 0;
}

function downloadReport(folder) {
    if (!folder) return;
    showToast('Preparing download...', 'info');
    const a = document.createElement('a');
    a.href = `${BASE_PATH}/api/results/${encodeURIComponent(folder)}/download`;
    a.download = folder + '_report.zip';
    a.click();
}

async function downloadBundle() {
    const checked = Array.from(document.querySelectorAll('.result-check:checked'));
    if (!checked.length) return;
    const folders = checked.map(cb => cb.value);
    showToast(`Bundling ${folders.length} report(s)... this may take a moment`, 'info', 10000);
    try {
        const resp = await fetch(`${BASE_PATH}/api/results/download-bundle`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ folders }),
        });
        if (!resp.ok) { showToast('Bundle download failed', 'error'); return; }
        const blob = await resp.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'reports_bundle.zip';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('Bundle downloaded', 'success');
    } catch(e) {
        showToast('Bundle download failed', 'error');
    }
}

async function regenerateReport(folder) {
    if (!confirmAction('Regenerate HTML report for ' + folder + '?\n\nThis may take several minutes for large JTL files.')) return;
    const btn = document.getElementById('regen-' + folder);
    if (btn) { btn.disabled = true; btn.textContent = 'Regenerating...'; }
    showToast('Regenerating report — this may take several minutes for large files...', 'info', 30000);
    try {
        const data = await api(`/api/results/${encodeURIComponent(folder)}/regenerate`, {
            method: 'POST',
            body: {}
        });
        if (data.ok) {
            showToast('Report regenerated', 'success');
            loadResults();
        }
    } catch(e) {
        showToast('Failed to regenerate report', 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Regenerate'; }
    }
}

async function deleteResult(folder) {
    if (!confirmAction('Delete result folder "' + folder + '"? This cannot be undone.')) return;
    try {
        await api(`/api/results/${encodeURIComponent(folder)}`, { method: 'DELETE' });
        showToast('Result deleted', 'success');
        loadResults();
    } catch(e) {}
}

async function openReport(folder) {
    if (isLocalhost) {
        // Open directly from filesystem — avoids proxy timeout for large reports
        await api(`/api/results/${encodeURIComponent(folder)}/open-report`, { method: 'POST' });
        return;
    }
    // Remote fallback: serve through API proxy
    window.open(`${BASE_PATH}/api/results/${encodeURIComponent(folder)}/report/index.html`, '_blank');
}

async function openFolder(folder) { await api(`/api/results/${encodeURIComponent(folder)}/open`, { method: 'POST' }); }

async function compareSelected() {
    const checked = Array.from(document.querySelectorAll('.result-check:checked'));
    if (checked.length !== 2) return;
    const f1 = checked[0].value, f2 = checked[1].value;
    const panel = document.getElementById('comparePanel');
    const content = document.getElementById('compareContent');
    content.innerHTML = '<p class="text-light">Comparing... (this may take a moment for large JTL files)</p>';
    panel.classList.remove('hidden');
    panel.scrollIntoView({ behavior: 'smooth' });

    try {
        const data = await api(`/api/results/compare?folder1=${encodeURIComponent(f1)}&folder2=${encodeURIComponent(f2)}`);
        if (data.error) { content.innerHTML = `<p class="text-light">${escHtml(data.error)}</p>`; return; }
        const d = data.diff;
        let html = `<div class="table-wrapper"><table>
            <thead><tr><th>Metric</th><th>${escHtml(f1)}</th><th>${escHtml(f2)}</th><th>Change</th></tr></thead><tbody>`;
        for (const [key, v] of Object.entries(d)) {
            const betterIfHigher = key === 'throughput';
            const isGood = betterIfHigher ? v.change_pct > 0 : v.change_pct < 0;
            const isBad = betterIfHigher ? v.change_pct < 0 : v.change_pct > 0;
            const cls = Math.abs(v.change_pct) < 1 ? '' : isGood ? 'badge-success' : isBad ? 'badge-danger' : '';
            const sign = v.change_pct > 0 ? '+' : '';
            html += `<tr><td style="font-weight:500;">${key}</td><td>${v.a}</td><td>${v.b}</td>
                <td>${cls ? `<span class="badge ${cls}">${sign}${v.change_pct}%</span>` : `${sign}${v.change_pct}%`}</td></tr>`;
        }
        html += '</tbody></table></div>';
        content.innerHTML = html;
    } catch(e) {
        content.innerHTML = `<p class="text-light">Compare failed: ${escHtml(e.message)}</p>`;
    }
}

loadResults();
</script>
{% endblock %}
