{% from 'icons.html' import icon %}
<div style="padding:16px;">
    <div class="flex-between mb-16">
        <div class="flex gap-8 items-center">
            <h3 class="text-sm section-title">{{ icon('package', 14) }} Extensions</h3>
            <span class="text-sm text-light" id="extCount"></span>
        </div>
        {% if access_level != 'viewer' %}
        <div class="flex gap-4 items-center">
            <label class="btn btn-outline btn-sm" style="margin:0;cursor:pointer;" data-tooltip="Upload JAR">
                {{ icon('upload', 14) }} Upload
                <input type="file" accept=".jar" onchange="uploadExtension(false)" id="uploadJarFile" hidden>
            </label>
            <button class="btn btn-outline btn-sm" onclick="installToMaster()" data-tooltip="Copy to local JMeter lib/ext">{{ icon('download', 14) }} Install Master</button>
            <button class="btn btn-primary btn-sm" onclick="deployToSlaves()" data-tooltip="SCP to all active slaves">{{ icon('send', 14) }} Deploy Slaves</button>
        </div>
        {% endif %}
    </div>
    <div id="extContainer">
        <div class="text-light" style="text-align:center;padding:16px;">Loading...</div>
    </div>
    <div class="empty-state" id="extEmpty" style="display:none">
        {{ icon('package', 48) }}
        <div class="empty-state-title">No extensions</div>
        <div class="empty-state-desc">Upload JAR files to add JMeter plugins.</div>
    </div>
</div>
