{% extends "base.html" %}

{% block title %}Scripts{% endblock %}
{% block page_title %}Scripts{% endblock %}

{% block content %}
<div class="card mb-16">
    <div class="card-header">
        <span class="card-title">Available Scripts</span>
        <button class="btn btn-outline btn-sm" onclick="loadScripts()">Refresh</button>
    </div>
    <div id="scriptsList"></div>
</div>

<div class="card">
    <div class="card-header">
        <span class="card-title">Output</span>
        <div class="flex gap-8">
            <span class="badge badge-info" id="scriptStatus">Idle</span>
            <button class="btn btn-danger btn-sm" id="stopScriptBtn" onclick="stopScript()" disabled>Stop</button>
        </div>
    </div>
    <div class="log-output" id="scriptOutput"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let ws = null;

async function loadScripts() {
    const data = await api('/api/scripts/list');
    const scripts = data.scripts || [];
    const container = document.getElementById('scriptsList');

    if (!scripts.length) {
        container.innerHTML = '<p class="text-secondary">No scripts found in configured directories.</p>';
        return;
    }

    // Group by directory
    const groups = {};
    scripts.forEach(s => {
        if (!groups[s.directory]) groups[s.directory] = [];
        groups[s.directory].push(s);
    });

    let html = '';
    for (const [dir, items] of Object.entries(groups)) {
        html += `<h3 class="text-sm mb-16" style="font-weight:600;margin-top:${html ? '16px' : '0'};">${escHtml(dir)}/</h3>`;
        html += '<div class="table-wrapper"><table><thead><tr><th>Script</th><th>Type</th><th>Actions</th></tr></thead><tbody>';
        items.forEach(s => {
            const typeClass = s.type === '.py' ? 'badge-info' : s.type === '.bat' ? 'badge-warning' : 'badge-success';
            html += `<tr>
                <td class="text-mono text-sm">${escHtml(s.name)}</td>
                <td><span class="badge ${typeClass}">${escHtml(s.type)}</span></td>
                <td><button class="btn btn-primary btn-sm" onclick="runScript('${escAttr(s.path)}')">Run</button></td>
            </tr>`;
        });
        html += '</tbody></table></div>';
    }
    container.innerHTML = html;
}

async function runScript(path) {
    document.getElementById('scriptOutput').textContent = '';
    try {
        const data = await api('/api/scripts/run', { method: 'POST', body: { path } });
        showToast('Script started: ' + data.label, 'info');
        setScriptState(true, data.label);
        connectOutputStream();
    } catch(e) { console.error(e); }
}

async function stopScript() {
    if (!await confirmAction('Stop the running script?', { danger: true })) return;
    await api('/api/scripts/stop', { method: 'POST' });
    setScriptState(false);
    showToast('Script stopped', 'warning');
}

function setScriptState(running, label) {
    const status = document.getElementById('scriptStatus');
    document.getElementById('stopScriptBtn').disabled = !running;
    status.textContent = running ? `Running: ${label || ''}` : 'Idle';
    status.className = running ? 'badge badge-warning' : 'badge badge-info';
}

function connectOutputStream() {
    if (ws) ws.close();
    const wm = new WSManager('/ws/scripts/output');
    wm.onMessage = (line) => appendLog('scriptOutput', line);
    wm.onClose = () => {
        appendLog('scriptOutput', '\n--- Done ---', 'log-info');
        setScriptState(false);
    };
    wm.connect();
    ws = wm;
}

async function checkStatus() {
    const data = await api('/api/scripts/status');
    if (data.running) {
        setScriptState(true, data.label);
        connectOutputStream();
    }
}

loadScripts();
checkStatus();
</script>
{% endblock %}
