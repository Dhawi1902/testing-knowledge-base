{% from 'icons.html' import icon %}
<!-- VM Configuration -->
<div class="mb-24" style="padding:16px;">
    <div class="flex-between mb-16">
        <h3 class="text-sm section-title">{{ icon('settings', 14) }} VM Configuration</h3>
        {% if access_level != 'viewer' %}
        <button class="btn btn-primary btn-sm" onclick="saveVmConfig()">Save</button>
        {% endif %}
    </div>
    <div id="vmForm">
        <div class="text-light" style="text-align:center;padding:16px;">Loading...</div>
    </div>
</div>

<hr style="border-color:var(--color-border);margin:0;">

<!-- Slave Properties -->
<div style="padding:16px;">
    <div class="flex-between mb-16">
        <div class="flex gap-8 items-center">
            <h3 class="text-sm section-title">Slave Properties</h3>
            <span class="text-sm text-light">slave-user.properties overrides <span id="jpropsCount"></span></span>
        </div>
        {% if access_level != 'viewer' %}
        <div class="flex gap-8">
            <button class="btn btn-outline btn-sm" onclick="openAddPropertyModal()">+ Add Property</button>
            <button class="btn btn-primary btn-sm" onclick="saveJmeterProperties()">Save</button>
        </div>
        {% endif %}
    </div>
    <div id="jpropsContainer">
        <div class="text-light" style="text-align:center;padding:16px;">Loading...</div>
    </div>
    <div class="text-sm text-light" id="jpropsPath" style="margin-top:8px;"></div>
</div>
