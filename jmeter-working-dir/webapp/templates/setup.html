<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup — JMeter Test Dashboard</title>
    <meta name="base-path" content="{{ bp }}">
    <link rel="stylesheet" href="{{ bp }}/static/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-bg); }
        .setup-card { max-width: 600px; width: 100%; }
        .setup-header { text-align: center; margin-bottom: 24px; }
        .setup-header h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .detected-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--color-border); }
        .detected-item:last-child { border-bottom: none; }
        .detected-label { font-size: 0.85rem; color: var(--color-text-light); }
        .detected-value { font-family: var(--font-mono); font-size: 0.85rem; }
        .detected-found { color: var(--color-success); }
        .detected-missing { color: var(--color-text-light); }
    </style>
</head>
<body>
    <div class="card setup-card">
        <div class="setup-header">
            <h1>JMeter Test Dashboard</h1>
            <p class="text-light">First-run setup — detected project structure</p>
        </div>

        <div class="form-group">
            <label class="form-label">Project Name</label>
            <input class="form-input" id="setupName" value="{{ project.name }}">
        </div>

        <div class="form-group">
            <label class="form-label">JMeter Path</label>
            <div class="flex gap-8">
                <input class="form-input form-input-mono" id="setupJmeter" value="{{ project.jmeter_path }}" style="flex:1;">
                <button class="btn btn-outline btn-sm" onclick="detectJmeter()">Detect</button>
            </div>
        </div>

        <h3 class="text-sm mb-16" style="font-weight:600;margin-top:20px;">Detected Paths</h3>
        <div id="detectedPaths">
            {% for key, value in project.paths.items() %}
            <div class="detected-item">
                <span class="detected-label">{{ key }}</span>
                {% if value %}
                <span class="detected-value detected-found">{{ value }}</span>
                {% else %}
                <span class="detected-value detected-missing">not found</span>
                {% endif %}
            </div>
            {% endfor %}
        </div>

        <div style="margin-top: 24px; text-align: center;">
            <button class="btn btn-primary" onclick="completeSetup()" style="min-width:200px;">Save & Continue</button>
        </div>
    </div>

    <script src="{{ bp }}/static/js/app.js"></script>
    <script>
    async function detectJmeter() {
        try {
            const data = await api('/api/config/detect-jmeter', { method: 'POST' });
            document.getElementById('setupJmeter').value = data.path;
            showToast('JMeter found', 'success');
        } catch(e) {}
    }

    async function completeSetup() {
        // Read current project config
        const resp = await api('/api/config/project');
        const config = resp.config;
        config.name = document.getElementById('setupName').value;
        config.jmeter_path = document.getElementById('setupJmeter').value;

        await api('/api/config/project', { method: 'PUT', body: { config } });
        await api('/api/setup/complete', { method: 'POST' });
        showToast('Setup complete!', 'success');
        setTimeout(() => { window.location.href = BASE_PATH + '/'; }, 500);
    }
    </script>
    <div class="toast-container" id="toastContainer"></div>
</body>
</html>
